<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Neon Runner | 2bitArcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    body,html{margin:0;padding:0;width:100%;height:100%;overflow:hidden;
      background:radial-gradient(ellipse at 50% 20%,#1a0b38 0%,#05020f 70%,#000 100%);
      display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'VT323',monospace;}
    #title{color:#ff9900;font-size:38px;letter-spacing:6px;margin:0 0 8px;text-shadow:0 0 14px #ff5500;}
    #game{border:2px solid #ff9900;box-shadow:0 0 30px rgba(255,120,0,0.35);background:#05020f;
      max-width:96vw;image-rendering:pixelated;touch-action:none;}
    #hint{color:#888;font-size:18px;margin-top:8px;}
    #arcade-home{position:fixed;top:8px;left:8px;z-index:500;font-family:'VT323',monospace;font-size:20px;
      color:#888;text-decoration:none;opacity:.6;}
    #arcade-home:hover{color:#ff9900;opacity:1;}
  </style>
</head>
<body>
  <a id="arcade-home" href="./index.html" title="Back to 2bitArcade">&#8962; ARCADE</a>
  <h1 id="title">NEON RUNNER</h1>
  <canvas id="game" width="900" height="360"></canvas>
  <p id="hint">SPACE / tap-top to JUMP &bull; DOWN / hold-bottom to DUCK &bull; every run counts toward the boards</p>
  <script src="neonrunner/neonrunner.js"></script>
  <script src="neonrunner/nr-bridge.js"></script>
</body>
</html>
