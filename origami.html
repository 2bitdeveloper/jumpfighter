<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Origami Ascent | 2bitArcade</title>
    <style>
      @font-face {
        font-family: 'origraph';
        src: url('origami/origraph.otf') format('opentype');
        font-weight: normal; font-style: normal;
        unicode-range: U+0000-002F, U+003A-10FFFF;
      }
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
        background-color: #000; font-family: 'origraph', system-ui, -apple-system, sans-serif; }
      #gameCanvas { display: block; width: 100vw; height: 100vh; }
      #fontPreloader { font-family: 'origraph'; position: absolute; opacity: 0.01; pointer-events: none; z-index: -1; }
      #arcade-home { position: fixed; top: 8px; left: 8px; z-index: 500; font-family: system-ui, sans-serif;
        font-size: 16px; color: #888; text-decoration: none; opacity: 0.6; }
      #arcade-home:hover { color: #ff9900; opacity: 1; }
    </style>
  </head>
  <body>
    <div id="fontPreloader">Preload</div>
    <canvas id="gameCanvas"></canvas>
    <a id="arcade-home" href="./index.html" title="Back to 2bitArcade">&#8962; ARCADE</a>
    <script type="module" src="/src/origami/main.ts"></script>
  </body>
</html>
